<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headFragment(pageTitle=${activateAccount} ? 'Aktywacja konta' : 'Resetowanie hasła')}"></head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-gray-800 p-8 rounded-xl shadow-lg">

    <h2 class="text-2xl font-bold text-center mb-6">
        <span th:if="${activateAccount}">Aktywacja Konta</span>
        <span th:unless="${activateAccount}">Resetowanie Hasła</span>
    </h2>

    <div th:if="${passwordErrors}" class="bg-red-600 text-white p-4 rounded mb-6 shadow-inner">
        <div class="flex items-center mb-2">
            <i class="fa-solid fa-circle-exclamation mr-2"></i>
            <span class="font-semibold">Błąd walidacji:</span>
        </div>
        <ul class="list-disc pl-8 text-sm space-y-1">
            <li th:each="e : ${passwordErrors}" th:text="${e}"></li>
        </ul>
    </div>

    <form th:action="@{${formAction}}" method="post" class="space-y-5">

        <div>
            <label for="password" class="block text-sm font-medium mb-1 text-gray-400">Nowe hasło</label>
            <div class="flex items-center bg-gray-700 border border-gray-600 rounded-lg focus-within:ring-2 focus-within:ring-indigo-500 transition duration-200">
                <span class="px-3 text-gray-500"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="password" name="password" required
                       class="w-full px-3 py-2 bg-transparent focus:outline-none text-white placeholder-gray-500"
                       placeholder="Min. 7 znaków i znak specjalny"/>
            </div>
        </div>

        <div>
            <label for="confirmPassword" class="block text-sm font-medium mb-1 text-gray-400">Powtórz hasło</label>
            <div class="flex items-center bg-gray-700 border border-gray-600 rounded-lg focus-within:ring-2 focus-within:ring-indigo-500 transition duration-200">
                <span class="px-3 text-gray-500"><i class="fa-solid fa-shield-halved"></i></span>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       class="w-full px-3 py-2 bg-transparent focus:outline-none text-white placeholder-gray-500"
                       placeholder="Wpisz ponownie hasło" />
            </div>
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform active:scale-95 transition duration-200">
                <i class="fa-solid fa-key mr-2"></i>
                <span th:text="${activateAccount} ? 'Aktywuj konto' : 'Zapisz nowe hasło'">Zatwierdź</span>
            </button>
        </div>

        <div class="text-center pt-2">
            <a th:href="@{/login}" class="text-sm text-gray-500 hover:text-indigo-400 transition">
                Wróć do logowania
            </a>
        </div>
    </form>

</div>

</body>
</html>
